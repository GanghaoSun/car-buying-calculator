<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购车比价计算器</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="购车比价">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --surface3:#1e2d44;
  --border:#2a3a55; --border-light:#3a4f72;
  --accent:#00d4ff; --accent2:#00ff9d; --accent3:#ff6b35; --accent4:#ffd700;
  --text:#e8eef8; --text-dim:#8899bb; --text-dimmer:#556688;
  --danger:#ff4d6d; --success:#00e676; --warn:#ffab40;
  --gift:#d946ef; --radius:12px; --radius-sm:8px;
  --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-body:15px;
  --fs-md:16px; --fs-lg:18px; --fs-xl:24px; --fs-xxl:28px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-body);font-weight:400;line-height:1.65;min-height:100vh;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

body::after{content:'';position:fixed;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(0,212,255,.06) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ===== PAGE SYSTEM ===== */
.page{display:none;position:relative;z-index:1;max-width:960px;margin:0 auto;padding:24px 20px 80px;animation:fadeIn .35s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== TOP NAV BAR ===== */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.topbar-brand{font-family:'Noto Serif SC',serif;font-size:var(--fs-body);font-weight:600;color:var(--text-dim);flex:1;white-space:nowrap}
.tab-btns{display:flex;gap:4px;overflow-x:auto;min-width:0}
.tab-btn{background:none;border:1px solid transparent;border-radius:8px;color:var(--text-dimmer);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-sm);padding:7px 14px;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text-dim);border-color:var(--border)}
.tab-btn.active{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent)}
.tab-btn .badge{background:var(--danger);color:#fff;font-size:var(--fs-xs);border-radius:100px;padding:1px 6px;margin-left:4px;font-family:'JetBrains Mono',monospace}

/* ===== HEADER ===== */
.page-header{text-align:center;padding:32px 0 24px}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:var(--fs-xs);letter-spacing:1.4px;text-transform:uppercase;padding:7px 16px;border-radius:100px;margin-bottom:16px}
.header-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
h1{font-family:'Noto Serif SC',serif;font-size:clamp(30px,4vw,44px);font-weight:700;line-height:1.2;background:linear-gradient(135deg,#e8eef8 0%,#00d4ff 50%,#00ff9d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.page-subtitle{color:var(--text-dim);font-size:var(--fs-body)}

/* ===== SECTION CARDS ===== */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:18px;position:relative;overflow:hidden;transition:border-color .3s}
.section-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--section-accent,linear-gradient(90deg,var(--accent),var(--accent2)))}
.section-card:hover{border-color:var(--border-light)}
.section-title{display:flex;align-items:center;gap:10px;font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;color:var(--text);margin-bottom:20px}
.section-title-spacer{flex:1}
.section-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-md);flex-shrink:0}

/* ===== FORM ===== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:7px}
label{font-size:var(--fs-sm);font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
label .required{color:var(--danger);margin-left:3px}
label .hint{font-size:var(--fs-xs);color:var(--text-dimmer);text-transform:none;letter-spacing:0;font-weight:400;margin-left:4px}

input[type="number"],input[type="date"],input[type="text"],select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-body);padding:11px 14px;transition:all .2s;width:100%;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--accent);background:rgba(0,212,255,.05);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
input::placeholder{color:var(--text-dimmer)}
.input-suffix{position:relative}
.input-suffix input{padding-right:34px}
.input-suffix .suffix-text{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);font-size:var(--fs-sm);pointer-events:none}

/* ===== RADIO ===== */
.radio-group{display:flex;gap:8px;flex-wrap:wrap}
.radio-option{position:relative}
.radio-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
.radio-option label{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;cursor:pointer;font-size:var(--fs-base);font-weight:500;color:var(--text-dim);text-transform:none;letter-spacing:0;transition:all .2s;white-space:nowrap}
.radio-option input:checked+label{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent)}
.radio-option label:hover{border-color:var(--border-light);color:var(--text)}

/* ===== DYNAMIC ROWS ===== */
.dyn-rows{display:flex;flex-direction:column;gap:7px}
.dyn-row{display:flex;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;transition:border-color .2s}
.dyn-row:focus-within{border-color:var(--border-light)}
.dyn-row .row-name{flex:1.4;background:transparent;border:none;padding:3px 0;font-size:var(--fs-base);color:var(--text);min-width:0;outline:none}
.dyn-divider{width:1px;height:18px;background:var(--border);flex-shrink:0}
.dyn-row .amt-wrap{position:relative;flex:1;min-width:80px}
.dyn-row .amt-wrap input[type="number"]{background:transparent;border:none;padding:3px 26px 3px 0;font-size:var(--fs-base);font-family:'JetBrains Mono',monospace;text-align:right;width:100%;outline:none}
.dyn-row .amt-wrap .unit{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:var(--fs-xs);color:var(--text-dimmer);pointer-events:none}
.btn-remove-row{background:none;border:none;color:var(--text-dimmer);cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:17px;border-radius:4px;transition:all .2s;flex-shrink:0;line-height:1}
.btn-remove-row:hover{color:var(--danger);background:rgba(255,77,109,.1)}

/* Add inline button */
.btn-add-inline{display:inline-flex;align-items:center;gap:4px;background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.3);border-radius:100px;color:var(--accent2);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-sm);font-weight:500;padding:6px 12px;transition:all .2s;white-space:nowrap}
.btn-add-inline:hover{background:rgba(0,255,157,.15);border-color:var(--accent2)}
.btn-add-inline.expense{background:rgba(255,171,64,.08);border-color:rgba(255,171,64,.3);color:var(--warn)}
.btn-add-inline.expense:hover{background:rgba(255,171,64,.15);border-color:var(--warn)}
.btn-add-inline.gift{background:rgba(217,70,239,.08);border-color:rgba(217,70,239,.3);color:var(--gift)}
.btn-add-inline.gift:hover{background:rgba(217,70,239,.15);border-color:var(--gift)}

.row-total{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 0;border-top:1px dashed var(--border);margin-top:5px}
.row-total .total-label{font-size:var(--fs-sm);color:var(--text-dimmer)}
.row-total .total-val{font-family:'JetBrains Mono',monospace;font-size:var(--fs-body);font-weight:700}
.total-val.income{color:var(--accent2)}
.total-val.expense-color{color:var(--warn)}
.total-val.gift-color{color:var(--gift)}

/* Two-col */
.two-col-sections{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.two-col-sections .section-card{margin-bottom:0}
@media(max-width:640px){.two-col-sections{grid-template-columns:1fr}}

/* ===== CONDITIONAL ===== */
.conditional{overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;max-height:0;opacity:0}
.conditional.visible{max-height:600px;opacity:1}
.conditional-inner{padding-top:16px;display:flex;flex-direction:column;gap:16px}

/* ===== ALERTS ===== */
.alert{display:flex;gap:10px;padding:13px 15px;border-radius:var(--radius-sm);font-size:var(--fs-sm);line-height:1.6;margin-top:14px}
.alert-icon{font-size:var(--fs-md);flex-shrink:0}
.alert-warn{background:rgba(255,171,64,.1);border:1px solid rgba(255,171,64,.3);color:var(--warn)}
.alert-info{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--accent)}
.alert-danger{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:var(--danger)}
.alert-success{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--success)}
.alert-gift{background:rgba(217,70,239,.07);border:1px solid rgba(217,70,239,.25);color:#e879f9;margin-top:0}

/* ===== BUTTONS ===== */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00d4ff,#00ff9d);border:none;border-radius:100px;color:#0a0e1a;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:var(--fs-lg);font-weight:700;letter-spacing:1.5px;padding:16px 52px;transition:all .3s;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,212,255,.4)}
.btn-primary:active{transform:translateY(0)}

.btn-sec{display:inline-flex;align-items:center;gap:7px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:10px;color:var(--accent);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-base);padding:10px 20px;transition:all .2s}
.btn-sec:hover{background:rgba(0,212,255,.18);border-color:var(--accent)}

.btn-save{display:inline-flex;align-items:center;gap:7px;background:rgba(0,255,157,.12);border:1px solid rgba(0,255,157,.4);border-radius:10px;color:var(--accent2);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-base);padding:10px 20px;transition:all .2s}
.btn-save:hover{background:rgba(0,255,157,.2);border-color:var(--accent2)}

.btn-danger{display:inline-flex;align-items:center;gap:7px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:10px;color:var(--danger);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-sm);padding:8px 14px;transition:all .2s}
.btn-danger:hover{background:rgba(255,77,109,.18)}

.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-dim);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:var(--fs-base);padding:10px 18px;transition:all .2s}
.btn-ghost:hover{border-color:var(--border-light);color:var(--text)}

.btn-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:24px}

/* ===== PAGE 2: RESULT CARD ===== */
.result-summary{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--border-light);border-radius:var(--radius);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.result-summary::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3))}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:760px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.summary-grid{grid-template-columns:1fr 1fr}}
.summary-item{text-align:center}
.summary-item .s-label{font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:.8px;color:var(--text-dimmer);margin-bottom:6px}
.summary-item .s-value{font-family:'JetBrains Mono',monospace;font-size:var(--fs-xl);font-weight:700}
.summary-item .s-sub{font-size:var(--fs-xs);color:var(--text-dimmer);margin-top:4px}
.s-pay{color:var(--warn)}
.s-final{color:var(--accent2)}
.s-gift{color:var(--gift)}

.savings-badge{text-align:center;margin-top:20px;padding-top:16px;border-top:1px dashed var(--border)}
.savings-badge .label{font-size:var(--fs-sm);color:var(--text-dimmer);margin-bottom:5px}
.savings-badge .amount{font-family:'JetBrains Mono',monospace;font-size:var(--fs-xxl);font-weight:700;color:var(--accent4)}
.savings-badge .sub{font-size:var(--fs-sm);color:var(--text-dimmer);margin-top:4px}

.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:18px}
.result-header{display:flex;align-items:center;gap:8px;font-family:'Noto Serif SC',serif;font-size:var(--fs-lg);font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.result-rows{display:flex;flex-direction:column}
.result-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(42,58,85,.5);gap:14px}
.result-row:last-child{border-bottom:none}
.result-label{display:flex;align-items:flex-start;gap:8px;font-size:var(--fs-base);color:var(--text-dim);max-width:58%;line-height:1.5}
.result-label .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
