name: 自动化质量核验

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: 安装固定依赖
        run: npm ci
      - name: 运行计算核心测试
        run: npm test

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: 安装固定依赖
        run: npm ci
      - name: 安装 Chromium / Firefox / WebKit
        run: npx playwright install --with-deps chromium firefox webkit
      - name: 运行浏览器端到端测试矩阵
        run: npm run test:e2e
      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: output/playwright/
          if-no-files-found: ignore
